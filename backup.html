    <style>
        :root {
            --primary: #6d28d9;
            --primary-light: #8b5cf6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --dark: #1f2937;
            --light: #f5f3ff;
            --white: #fff;
            --glass: rgba(255, 255, 255, .9);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, .05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, .1), 0 2px 4px -2px rgba(0, 0, 0, .1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, .1), 0 4px 6px -4px rgba(0, 0, 0, .1);
            --transition: all .3s ease
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden
        }

        body.splash-active {
            overflow: hidden
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition)
        }

        ul {
            list-style: none
        }

        img {
            max-width: 100%;
            height: auto
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            padding: 1rem 0;
            transition: transform .3s ease, background .3s ease, box-shadow .3s ease;
            transform-origin: top;
            will-change: transform, background, box-shadow
        }

        nav.scrolled {
            padding: .7rem 0;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1)
        }

        nav .container {
            display: flex;
            align-items: center;
            position: relative
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 1;
            min-width: 0
        }

        .logo-container img {
            height: 55px;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, .1))
        }

        .school-name {
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--primary);
            line-height: 1.1;
            letter-spacing: -.5px;
            flex-shrink: 1
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%)
        }

        .nav-links a {
            font-weight: 600;
            font-size: .875rem;
            color: var(--dark);
            padding: 0.45rem 1.1rem;
            border-radius: 9999px;
            text-decoration: none;
            transition: var(--transition);
            white-space: nowrap
        }

        .nav-links a:hover {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(109, 40, 217, 0.3);
            transform: translateY(-1px)
        }

        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
            margin-left: auto
        }

        .hero {
            height: 95vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            margin-top: 0;
            padding-top: 80px;
            overflow: hidden;
            background: #000;
            will-change: transform
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 10%;
            z-index: 1;
            opacity: 1;
            will-change: opacity, transform
        }

        @media (max-width:768px) {
            .hero {
                height: 80vh
            }
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(109, 40, 217, .8), rgba(139, 92, 246, .5));
            z-index: 2
        }

        .hero-content {
            position: relative;
            z-index: 5;
            max-width: 900px;
            padding: 0 20px;
            will-change: transform, opacity
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, .3);
            line-height: 1.1
        }

        .hero-content p {
            font-size: clamp(1rem, 3vw, 1.25rem);
            margin-bottom: 2.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto
        }

        .cta-btn {
            background: var(--primary-light);
            color: var(--white);
            padding: 1.1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(59, 130, 246, .4);
            display: inline-block
        }

        .cta-btn:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, .2)
        }

        .special-sections {
            padding: 8rem 0;
            background: var(--light)
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem
        }

        .section-header h2 {
            font-size: 2.75rem;
            color: var(--primary);
            margin-bottom: 1rem;
            font-weight: 800
        }

        .section-header .divider {
            width: 80px;
            height: 4px;
            background: var(--primary-light);
            margin: 0 auto 1.5rem;
            border-radius: 2px
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem
        }

        .card {
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .05);
            transition: var(--transition);
            display: flex;
            flex-direction: column
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .1)
        }

        .card-img {
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            padding: 2rem;
            position: relative;
            overflow: hidden
        }

        footer h2 {
            color: var(--white);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: .5rem
        }

        footer h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 2px;
            background: var(--primary-light)
        }

        .contact-social h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--primary)
        }

        .card-img::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, .02), transparent)
        }

        .card-img img {
            max-height: 100%;
            width: auto;
            object-fit: contain;
            transition: var(--transition);
            z-index: 1
        }

        .card:hover .card-img img {
            transform: scale(1.05)
        }

        .card-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center
        }

        .card-content h2 {
            margin-bottom: 1.25rem;
            color: var(--primary);
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center
        }

        .card-content p {
            color: #4b5563;
            font-size: 1.05rem;
            margin-bottom: 1.5rem
        }

        .news-section {
            padding: 8rem 0;
            background: var(--white)
        }

        .social-connect {
            background: linear-gradient(135deg, #f3f4f6 0%, #fff 100%);
            padding: 5rem;
            border-radius: 40px;
            text-align: center;
            margin-top: 4rem;
            border: 1px solid rgba(0, 0, 0, .05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, .02)
        }

        .social-connect h2 {
            font-size: 2.25rem;
            margin-bottom: 1rem;
            color: var(--dark)
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 4rem;
            margin-top: 3.5rem;
            flex-wrap: wrap
        }

        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none
        }

        .social-link i {
            font-size: 3rem;
            transition: var(--transition);
            background: #fff;
            padding: 1.5rem;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, .05)
        }

        .social-link.tiktok i {
            color: #000
        }

        .social-link.instagram i {
            color: #e4405f
        }

        .social-link span {
            font-weight: 700;
            color: var(--dark);
            font-size: 1.1rem
        }

        .social-link:hover img {
            transform: translateY(-10px) rotate(5deg);
            box-shadow: 0 20px 30px rgba(0, 0, 0, .15)
        }

        .gallery-section {
            padding: 8rem 0;
            background: var(--light)
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-top: 3rem
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/5;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition)
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s ease;
            aspect-ratio: 4/3;
            background-color: #f3f4f6
        }

        .gallery-item:hover img {
            transform: scale(1.1)
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(109, 40, 217, .7));
            opacity: 0;
            transition: var(--transition);
            display: flex;
            align-items: flex-end;
            padding: 2rem;
            color: var(--white)
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1
        }

        .gallery-overlay span {
            font-weight: 700;
            font-size: 1.1rem;
            transform: translateY(20px);
            transition: transform .4s ease
        }

        .gallery-item.hidden-item {
            display: none
        }

        .gallery-grid.show-all .gallery-item.hidden-item {
            display: block
        }

        .view-all-container {
            text-align: center;
            margin-top: 3rem
        }

        .btn-view-all {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: .8rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition)
        }

        .btn-view-all:hover {
            background: var(--primary);
            color: var(--white)
        }

        footer {
            background: var(--dark);
            color: var(--white);
            padding: 6rem 0 3rem
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr;
            gap: 4rem;
            margin-bottom: 4rem
        }

        .footer-map h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: .5rem
        }

        .footer-map h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--primary-light)
        }

        .footer-map iframe {
            box-shadow: 0 10px 20px rgba(0, 0, 0, .2)
        }

        .footer-info h2 {
            font-size: 1.75rem;

                // Entrance animation
                tl.from(splashLogo, {
                    scale: 0.8,
                    opacity: 0,
                    duration: 1,
                    ease: "back.out(1.7)"
                })
                    .to(splashMsg, {
                        opacity: 1,
                        y: 0,
                        duration: 0.8,
                        ease: "power2.out"
                    }, "-=0.4");

                // Wait and then exit
                setTimeout(() => {
                    tl.to(splash, {
                        opacity: 0,
                        duration: 0.8,
                        ease: "power2.inOut",
                        onComplete: () => {
                            splash.style.display = 'none';
                            document.body.classList.remove('splash-active');
                            initializeAnimations();
                            if (typeof ScrollTrigger !== 'undefined') {
                                ScrollTrigger.refresh();
                            }
                        }
                    });
                }, 2000);
            } else {
                // Fallback if GSAP is not available
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        document.body.classList.remove('splash-active');
                        initializeAnimations();
                        if (typeof ScrollTrigger !== 'undefined') {
                            ScrollTrigger.refresh();
                        }
                    }, 800);
                }, 2500);
            }
        });

        function initializeAnimations() {
            if (typeof gsap === 'undefined') return;

            gsap.registerPlugin(ScrollTrigger);

            // Visi Misi Reveal
            gsap.from(".visi-box", {
                scrollTrigger: {
                    trigger: ".visi-box",
                    start: "top 90%"
                },
                y: 30,
                autoAlpha: 0,
                duration: 0.6,
                ease: "power2.out"
            });

            gsap.from(".misi-box", {
                scrollTrigger: {
                    trigger: ".misi-tujuan-grid",
                    start: "top 90%"
                },
                x: -30,
                autoAlpha: 0,
                duration: 0.6,
                ease: "power2.out"
            });

            gsap.from(".tujuan-box", {
                scrollTrigger: {
                    trigger: ".misi-tujuan-grid",
                    start: "top 90%"
                },
                y: 30,
                autoAlpha: 0,
                duration: 0.6,
                delay: 0.2,
                ease: "power2.out"
            });

            gsap.from(".program-box", {
                scrollTrigger: {
                    trigger: ".misi-tujuan-grid",
                    start: "top 90%"
                },
                x: 30,
                autoAlpha: 0,
                duration: 0.6,
                ease: "power2.out"
            });

            // Section Header Reveal
            document.querySelectorAll('.section-header').forEach(header => {
                gsap.from(header, {
                    scrollTrigger: {
                        trigger: header,
                        start: "top 95%"
                    },
                    y: 30,
                    autoAlpha: 0,
                    duration: 1,
                    ease: "power2.out"
                });
            });

            // Cards Reveal
            gsap.from(".card", {
                scrollTrigger: {
                    trigger: ".section-grid",
                    start: "top 95%"
                },
                y: 30,
                duration: 0.8,
                stagger: 0.1,
                ease: "power2.out"
            });

            // Legalitas Reveal
            gsap.from(".legal-card", {
                scrollTrigger: {
                    trigger: ".legal-grid",
                    start: "top 90%"
                },
                scale: 0.95,
                duration: 0.6,
                stagger: 0.1,
                ease: "back.out(1.7)"
            });

            // Social Connect Reveal
            gsap.from(".social-connect", {
                scrollTrigger: {
                    trigger: ".social-connect",
                    start: "top 95%"
                },
                scale: 0.98,
                autoAlpha: 0,
                duration: 0.8,
                ease: "power2.out"
            });

            // Gallery Reveal
            gsap.from(".gallery-item", {
                scrollTrigger: {
                    trigger: ".gallery-grid",
                    start: "top 90%"
                },
                y: 20,
                duration: 0.6,
                stagger: 0.05,
                ease: "power2.out"
            });

            // Footer Reveal
            gsap.from(".footer-info", {
                scrollTrigger: {
                    trigger: "footer",
                    start: "top 85%"
                },
                y: 20,
                duration: 0.8,
                ease: "power2.out"
            });

            gsap.from(".footer-links", {
                scrollTrigger: {
                    trigger: "footer",
                    start: "top 85%"
                },
                y: 20,
                stagger: 0.1,
                duration: 0.8,
                ease: "power2.out",
                delay: 0.1
            });

            // GSAP Animations initialized
        }

        // Scroll Events
        window.addEventListener('scroll', () => {
            const header = document.querySelector('nav');
            const btBtn = document.getElementById('backToTop');
            if (!header || !btBtn) return;

            if (window.scrollY > 80) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }

            if (window.scrollY > 500) {
                btBtn.classList.add('show');
            } else {
                btBtn.classList.remove('show');
            }
        }, { passive: true });

        // Reset scroll position on reload
        if (history.scrollRestoration) {
            history.scrollRestoration = 'manual';
        }

        // Mobile Menu Toggle
        const mobileToggle = document.querySelector('.mobile-toggle');
        const navLinks = document.querySelector('.nav-links');

        mobileToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const isActive = navLinks.classList.contains('active');
            mobileToggle.setAttribute('aria-expanded', isActive);
            const icon = mobileToggle.querySelector('i');

            if (isActive) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
                if (typeof gsap !== 'undefined') {
                    gsap.from(".nav-links li", {
                        y: -10,
                        opacity: 0,
                        stagger: 0.05,
                        duration: 0.3,
                        ease: "power2.out"
                    });
                }
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });

        // Smooth Scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }

                if (navLinks.classList.contains('active')) {
                    navLinks.classList.remove('active');
                    mobileToggle.querySelector('i').classList.add('fa-bars');
                    mobileToggle.querySelector('i').classList.remove('fa-times');
                }
            });
        });

        // Back to Top Logic
        document.getElementById('backToTop').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Gallery View All Logic
        const btnViewAll = document.getElementById('btnViewAll');
        const galleryGrid = document.querySelector('.gallery-grid');
        if (btnViewAll) {
            btnViewAll.addEventListener('click', () => {
                galleryGrid.classList.toggle('show-all');
                if (galleryGrid.classList.contains('show-all')) {
                    btnViewAll.textContent = 'Sembunyikan Foto';
                    if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.refresh();
                } else {
                    btnViewAll.textContent = 'Lihat Semua Foto';
                    document.getElementById('galeri').scrollIntoView({ behavior: 'smooth' });
                }
            });
        }

        // Initiation
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof gsap !== 'undefined') {
                if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.refresh();

                // LCP Optimization: Show hero core content instantly
                // initializeAnimations(); // Removed to avoid double call

                const tl = gsap.timeline();
                tl.to(".hero-content h1", {
                    y: 0, autoAlpha: 1, duration: 0, ease: "none"
                }).to(".hero-content p", {
                    y: 0, autoAlpha: 1, duration: 0.2, startAt: { y: 10 }, ease: "power2.out"
                }, "-=0.1").to(".cta-btn", {
                    scale: 1, autoAlpha: 1, duration: 0.3, startAt: { scale: 0.9 }, ease: "back.out(1.7)"
                }, "-=0.1");
            } else {
                // Fallback if GSAP fails load
                document.querySelectorAll('.hero-content h1, .hero-content p, .cta-btn').forEach(el => {
                    el.style.opacity = '1';
                    el.style.visibility = 'visible';
                });
            }
        });
        //]]>
    </script>
